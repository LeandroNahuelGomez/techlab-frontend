<nav class="navbar" *ngIf="authService.usuarioActual()">
  <div class="logo">
    <h2>TechLab E-Commerce</h2>
    <span class="user-badge">
      {{ authService.usuarioActual().nombre }} ({{ authService.usuarioActual().rol }})
    </span>
  </div>
  
  <ul class="nav-links">
    <ng-container *ngIf="authService.usuarioActual().rol === 'CLIENTE'">
      <li><a routerLink="/productos" routerLinkActive="activo">Catálogo</a></li>
      <li><a routerLink="/carrito" routerLinkActive="activo">Mi Carrito</a></li>
      <li><a routerLink="/pedidos" routerLinkActive="activo">Historial de Compras</a></li>
    </ng-container>

    <ng-container *ngIf="authService.usuarioActual().rol === 'ADMIN'">
      <li><a routerLink="/admin" routerLinkActive="activo" class="link-admin">Panel Admin</a></li>
    </ng-container>
    
    <li>
      <button class="btn-logout" (click)="cerrarSesion()">Cerrar Sesión</button>
    </li>
  </ul>
</nav>

<main class="contenedor-principal">
  <router-outlet></router-outlet>
</main>
