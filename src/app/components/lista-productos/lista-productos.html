<div class="container">
  <h2>Catálogo de Productos</h2>
  
  <div *ngIf="!productos() || productos()?.length === 0" style="text-align: center; padding: 50px; background: white; border-radius: 10px; margin-top: 20px;">
    <h3 style="color: #7f8c8d;">No hay productos disponibles en este momento 😢</h3>
  </div>
  
  <div class="grid-productos" *ngIf="productos() && productos()!.length > 0">
    <div class="card" *ngFor="let prod of productos()">
      <img [src]="prod.imagenUrl" [alt]="prod.nombre">
      
      <h3>{{ prod.nombre }}</h3>
      <p>{{ prod.descripcion }}</p>
      
      <h2 class="precio">${{ prod.precio }}</h2>
      
      <p>
        Stock disponible: {{ prod.stock }}
      </p>
      
      <button 
        class="btn-agregar"
        (click)="agregarAlCarrito(prod)" 
        [disabled]="prod.stock === 0">
        Agregar al Carrito
      </button>
    </div>
  </div>
</div>
