<div class="login-wrapper">
  <div class="login-glass-card">
    
    <div class="login-header">
      <h2 class="marca">TechLab<span class="punto-azul">.</span></h2>
      <p class="subtitulo">Bienvenido de nuevo, ingresa a tu cuenta</p>
    </div>

    <div class="alerta-error fadeIn" *ngIf="errorMensaje">
      <span class="icono-error">⚠️</span> {{ errorMensaje }}
    </div>

    <form (ngSubmit)="iniciarSesion()" #loginForm="ngForm" class="form-login">
      
      <div class="input-group">
        <label>Correo Electrónico</label>
        <input 
          type="email" 
          name="email" 
          [(ngModel)]="credenciales.email" 
          required 
          placeholder="ejemplo@correo.com"
          class="input-moderno">
      </div>

      <div class="input-group">
        <label>Contraseña</label>
        <input 
          type="password" 
          name="password" 
          [(ngModel)]="credenciales.password" 
          required 
          placeholder="••••••••"
          class="input-moderno">
      </div>

      <button type="submit" class="btn-ingresar" [disabled]="!loginForm.valid">
        Iniciar Sesión
      </button>
    </form>

    <div class="divisor-container">
      <span class="linea"></span>
      <span class="texto-divisor">Accesos de Prueba</span>
      <span class="linea"></span>
    </div>

    <div class="botones-demo">
      <button class="btn-demo admin" (click)="cargarAdmin()">
        <span class="icono-btn">🛡️</span> Admin
      </button>
      <button class="btn-demo cliente" (click)="cargarCliente()">
        <span class="icono-btn">👤</span> Cliente
      </button>
    </div>

  </div>
</div>
